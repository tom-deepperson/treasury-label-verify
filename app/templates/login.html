<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>label-verify login</title>
  <link rel="stylesheet" href="/static/terminal.css">
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <h1>TTB LABEL VERIFY :: ACCESS GATE</h1>
      <div class="status-bar">Prototype demo | authorized reviewers only</div>
    </div>
    <div class="panel">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <label for="username">USER:</label>
        <input id="username" name="username" type="text" required autocomplete="username">
        <label for="password">PASS:</label>
        <input id="password" name="password" type="password" required autocomplete="current-password">
        <button class="btn" type="submit">AUTHENTICATE</button>
      </form>
      <p class="hint login-hint blink">awaiting credentials...</p>
    </div>
  </div>
</body>
</html>
